# Generated from:
# https://github.com/plone/meta/tree/2.x/src/plone/meta/default
# See the inline comments on how to expand/tweak this configuration file
[meta]
template = "default"
commit-id = "2.8.1.dev0"

[github]
# No 'circular' as it fails on 6.1 for plone.api and Products.CMFPlone.
jobs = [
   "qa",
   "coverage",
   "dependencies",
   "release_ready",
   ]

[pyproject]
dependencies_mappings = [
    "'Products.ZCatalog' = ['Products.PluginIndexes']",
    ]
dependencies_ignores = "['setuptools']"

[tox]
test_matrix = {"6.0" = ["*"], "6.1" = ["*"]}
